services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/migrations:/docker-entrypoint-initdb.d
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  seeder:
    image: postgres:15-alpine
    container_name: ecommerce-seeder
    environment:
      PGPASSWORD: password
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src/database/seeders:/seeders
    command: >
      sh -c "
      for file in /seeders/*.sql; do
        psql -h postgres -U user -d ecommerce_db -f \"$$file\" || exit 1;
      done
      "
    networks:
      - ecommerce-network

  adminer:
    image: adminer:latest
    container_name: ecommerce-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - ecommerce-network

volumes:
  postgres_data:

networks:
  ecommerce-network:
    driver: bridge
